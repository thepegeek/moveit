<!doctype html>
<html>

<head>
    <title>Move It</title>
    <link rel="stylesheet" href="style/fonts.css" type="text/css">
    <link rel="stylesheet" href="style/activity_tab.css" type="text/css">
    <style>
        #random-image {
            width: 400px;
            height: 400px;
        }
        #shuffle-button {
            display: block;
            text-align: center;
            margin: 14px auto 0;
            cursor: pointer;
            opacity: 0.65;
            font-size: 16px;
            letter-spacing: 1px;
        }
        #shuffle-button:hover {
            opacity: 1;
        }
        #completion-count {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 1px;
        }
        #review-prompt {
            display: none;
            margin: 18px auto 0;
            max-width: 420px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 14px 18px;
            text-align: center;
        }
        #review-prompt p {
            margin: 0 0 10px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        #review-prompt .review-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #review-rate {
            cursor: pointer;
            background: white;
            color: #FF6687;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-family: 'Londrina Solid';
            font-size: 15px;
            font-weight: 400;
        }
        #review-rate:hover { background: #eee; }
        #review-dismiss {
            cursor: pointer;
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            padding: 6px 16px;
            font-family: 'Londrina Solid';
            font-size: 15px;
            font-weight: 300;
            opacity: 0.7;
        }
        #review-dismiss:hover { opacity: 1; }
    </style>
    <meta http-equiv="Content-Security-Policy" content="img-src 'self' blob: https://api.cloudnouns.com; connect-src https://www.google-analytics.com;">
</head>

<body>
    <div id="app-logo">
        <h1>Move It</h1>
    </div>
    <div id="activity-area">
        <div id="activity"></div>
        <div id="shuffle-button">Different exercise ↺</div>
        <div id="done-button">Done</div>
        <div id="completion-count"></div>
        <div id="review-prompt">
            <p>You've completed 10 activities! Enjoying Move It? A quick rating helps others find it ⭐</p>
            <div class="review-actions">
                <button id="review-rate">Rate Move It</button>
                <button id="review-dismiss">Maybe later</button>
            </div>
        </div>
    </div>
    <div id="brand-logo">
        <img id="random-image" src="https://api.cloudnouns.com/v1/pfp?background=0"
            onerror="this.onerror=null; this.src='imgs/fallback.svg';">
    </div>
    <script src="js/activities.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/activity_tab.js"></script>
</body>

</html>
